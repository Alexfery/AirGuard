<mat-card class="chart-card">
  <mat-card-header>
    <mat-card-title>
      <mat-icon>show_chart</mat-icon>
      Date în timp real
    </mat-card-title>
    <div class="chart-toggles">
      @for (ds of datasetDefs; track ds.key) {
        <button
          mat-stroked-button
          class="toggle-btn"
          [class.active]="isActive(ds.key)"
          [style.--ds-color]="ds.color"
          (click)="toggleMetric(ds.key)"
          [matTooltip]="isActive(ds.key) ? 'Ascunde ' + ds.label : 'Afișează ' + ds.label">
          <span class="dot" [style.background]="ds.color"></span>
          {{ ds.label }}
        </button>
      }
    </div>
  </mat-card-header>

  <mat-card-content>
    <div class="chart-wrapper">
      <canvas #chartCanvas></canvas>
    </div>
  </mat-card-content>
</mat-card>
